hex_ros_robot_hello_y6:
  ros__parameters:
    # main loop rate [hz] — equals robot ctrl_rate
    ctrl_rate: 500.0

    # robot state publish rate [hz]
    rate_state: 100.0

    # robot connection
    robot_host: "192.168.1.100"
    robot_port: 8439

    # frame id used in the published state header
    robot_frame_id: "base_link"

    # driver state buffer size
    state_buffer_size: 200

    # sensor timestamp enable
    sens_ts: false

    # time source: false → PTP (ns_now), true → ROS clock
    use_ros_time: false
